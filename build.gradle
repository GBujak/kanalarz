// Existing content of build.gradle

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
            groupId = 'your.group.id' // TODO: replace with your groupId
            artifactId = 'kanalarz' // or your artifact name
            version = '1.0.0'
        }
    }
    repositories {
        maven {
            name = "OSSRH"
            url = uri("https://s01.oss.sonatype.org/service/local/staging/deploy/maven2/")
            credentials {
                username = 'yourSonatypeUsername' // TODO: replace
                password = 'yourSonatypePassword' // TODO: replace
            }
        }
    }
}

signing {
    sign publishing.publications.mavenJava
    // TODO: Configure GPG key
}